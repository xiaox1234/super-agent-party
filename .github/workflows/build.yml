name: Build and Release

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows-x64
          - linux-x64
          - linux-arm64
          - macos
      version:
        description: '版本号（例如：0.5.0，不要带 v 前缀）'
        required: false
        type: string
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        type: boolean
        default: false

jobs:

  # ────────── Windows x64 ──────────
  build-windows:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows-x64'))
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version and create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          if ("${{ inputs.create_release }}" -eq "true") {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Python backend
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec

      - name: Build and Publish Electron app (Windows)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              PUBLISH_FLAG="--publish always"
            else
              PUBLISH_FLAG=""
            fi
          else
            PUBLISH_FLAG="--publish always"
          fi
          npx electron-builder build --win $PUBLISH_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # ────────── Linux x64 ──────────
  build-linux-x64:
