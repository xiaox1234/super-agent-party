name: Build and Release

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows-x64
          - linux-x64
          - linux-arm64
          - macos-x64
          - macos-arm64
      version:
        description: '版本号（例如：0.5.0，不要带 v 前缀）'
        required: false
        type: string
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-13
            arch: x64
          - os: macos-latest
            arch: arm64

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Python backend
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec

      - name: Build and Publish Electron app
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest)
              npx electron-builder build --win --publish always
              ;;
            ubuntu-latest|ubuntu-24.04-arm)
              npx electron-builder build --linux --publish always
              ;;
            macos-13|macos-latest)
              npx electron-builder build --mac --publish always
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false