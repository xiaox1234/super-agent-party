name: Build and Release

on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - windows-x64
          - linux-x64
          - linux-arm64
          - macos
      version:
        description: '版本号（例如：0.5.0，不要带 v 前缀）'
        required: false
        type: string
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        required: true
        type: boolean
        default: false

jobs:

  # ────────── Windows x64 ──────────
  build-windows:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'windows-x64'))
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version and create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          if ("${{ inputs.create_release }}" -eq "true") {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Python backend
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec

      - name: Build and Publish Electron app (Windows)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              PUBLISH_FLAG="--publish always"
            else
              PUBLISH_FLAG=""
            fi
          else
            PUBLISH_FLAG="--publish always"
          fi
          npx electron-builder build --win $PUBLISH_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # ────────── Linux x64 ──────────
  build-linux-x64:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'linux-x64'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version and create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          if [[ "${{ inputs.create_release }}" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Python backend
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec

      - name: Build and Publish Electron app (Linux x64)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              PUBLISH_FLAG="--publish always"
            else
              PUBLISH_FLAG=""
            fi
          else
            PUBLISH_FLAG="--publish always"
          fi
          npx electron-builder build --linux --x64 $PUBLISH_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # ────────── Linux arm64 ──────────
  build-linux-arm64:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'linux-arm64'))
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version and create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          if [[ "${{ inputs.create_release }}" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Python backend
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec

      - name: Build and Publish Electron app (Linux arm64)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              PUBLISH_FLAG="--publish always"
            else
              PUBLISH_FLAG=""
            fi
          else
            PUBLISH_FLAG="--publish always"
          fi
          npx electron-builder build --linux --arm64 $PUBLISH_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # ────────── macOS Universal ──────────
  build-macos:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' || inputs.platform == 'macos'))
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version and create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          if [[ "${{ inputs.create_release }}" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Set up Python (arm64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies (arm64)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv venv
          uv sync

      - name: Install Node.js dependencies
        run: npm install

      # ========== 构建 arm64 后端 ==========
      - name: Build Python backend (arm64)
        run: |
          uv add pyinstaller
          uv run pyinstaller server.spec
          mv dist/server dist/server_arm64

      # ========== 构建 x86_64 后端 (通过 Rosetta 2) ==========
      - name: Setup x86_64 Python via Rosetta
        run: |
          curl -L https://github.com/indygreg/python-build-standalone/releases/download/20241002/cpython-3.12.7+20241002-x86_64-apple-darwin-install_only.tar.gz -o python-x64.tar.gz
          mkdir -p python-x64
          tar -xzf python-x64.tar.gz -C python-x64
          sudo ln -sf $(pwd)/python-x64/python/bin/python3 /usr/local/bin/python3-x64
          # 验证解释器确实是 x86_64
          arch -x86_64 /usr/local/bin/python3-x64 -c "import platform; print('Python arch:', platform.machine())"

      - name: Install Python dependencies (x86_64)
        run: |
          # 先给 x86_64 Python 装好 pip/uv（在系统级，不进入 venv）
          arch -x86_64 /usr/local/bin/python3-x64 -m pip install --upgrade pip
          arch -x86_64 /usr/local/bin/python3-x64 -m pip install uv

          # 使用系统自带的 venv 创建虚拟环境（确保是纯 x86_64）
          arch -x86_64 /usr/local/bin/python3-x64 -m venv venv_x64
          source venv_x64/bin/activate

          # 强制验证虚拟环境中的 Python 必须是 x86_64
          echo "=== VENV Python arch ==="
          python -c "import platform; assert platform.machine() == 'x86_64', 'VENV is not x86_64!'; print('OK')"

          # 在虚拟环境中安装项目依赖（uv sync 会自动使用当前 venv）
          uv sync

      - name: Build Python backend (x86_64)
        run: |
          source venv_x64/bin/activate

          # 再次确认架构
          echo "=== Build Python arch ==="
          python -c "import platform; assert platform.machine() == 'x86_64', 'Build Python is not x86_64!'; print('OK')"

          uv add pyinstaller
          uv run pyinstaller server.spec

          # 验证产出的 server 二进制架构
          echo "=== Output binary arch ==="
          file dist/server/server

          mv dist/server dist/server_x64

      # ========== 合并为 Universal Binary ==========
      - name: Create Universal Python backend
        run: |
          echo "=== arm64 产物架构 ==="
          file dist/server_arm64/server
          
          echo "=== x86_64 产物架构 ==="
          file dist/server_x64/server
          
          # 合并
          mkdir -p dist/server
          lipo -create dist/server_arm64/server dist/server_x64/server -output dist/server/server
          chmod +x dist/server/server
          
          echo "=== Universal 产物架构 ==="
          file dist/server/server
          lipo -info dist/server/server
          
          # 复制其他文件
          cp -rn dist/server_arm64/* dist/server/ 2>/dev/null || true

      - name: Build and Publish Electron app (macOS Universal)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.create_release }}" == "true" ]]; then
              PUBLISH_FLAG="--publish always"
            else
              PUBLISH_FLAG=""
            fi
          else
            PUBLISH_FLAG="--publish always"
          fi
          npx electron-builder build --mac --universal $PUBLISH_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false